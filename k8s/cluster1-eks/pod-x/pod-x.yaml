################################################################################
# Pod X — demo pod to show AuthorizationPolicy blocking direct access to receiver
#
# Step 6: After applying authpolicy, run:
#   kubectl exec pod-x --context cluster1-eks -- curl -s http://receiver/
# Expected: RBAC: access denied
# Screenshot this output to prove AuthPolicy works.
################################################################################
apiVersion: v1
kind: Pod
metadata:
  name: pod-x
  namespace: default
  labels:
    app: pod-x
spec:
  containers:
  - name: curl
    image: curlimages/curl:latest
    command:
    - /bin/sh
    - -c
    - |
      echo "Pod X ready. Run test with:"
      echo "kubectl exec pod-x -- curl -sv http://receiver/"
      sleep infinity
    resources:
      requests:
        cpu: 10m
        memory: 16Mi
      limits:
        cpu: 50m
        memory: 32Mi
  restartPolicy: Always
