apiVersion: apps/v1
kind: Deployment
metadata:
  name: receiver
  namespace: default
  labels:
    app: receiver
    version: v1
spec:
  replicas: 1
  selector:
    matchLabels:
      app: receiver
  template:
    metadata:
      labels:
        app: receiver
        version: v1
    spec:
      containers:
      - name: receiver
        image: hashicorp/http-echo:latest
        args:
        - "-text=hello world"
        - "-listen=:5678"
        ports:
        - containerPort: 5678
          name: http
        resources:
          requests:
            cpu: 10m
            memory: 32Mi
          limits:
            cpu: 100m
            memory: 64Mi
        readinessProbe:
          httpGet:
            path: /
            port: 5678
          initialDelaySeconds: 5
          periodSeconds: 10
        livenessProbe:
          httpGet:
            path: /
            port: 5678
          initialDelaySeconds: 10
          periodSeconds: 30
